name: Build PSP EBOOT

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pspdev/pspdev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PSP SDK
        run: |
          which psp-config
          psp-config --pspsdk-path

      - name: Build
        run: make -j"$(nproc)"

      - name: Check output
        run: |
          test -f EBOOT.PBP
          ls -lh EBOOT.PBP

      - name: Upload EBOOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: EBOOT.PBP
          path: EBOOT.PBP
          if-no-files-found: error
